<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스파르타 북큐레이션</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #FA0030;
      --black: #222222;
      --gray: #8C8C8C;
      --light-gray: #F5F5F5;
      --white: #FFFFFF;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--black);
      background: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ───── HEADER ───── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 60px;
      background: var(--white);
      border-bottom: 1px solid rgba(0,0,0,0.11);
      display: flex;
      align-items: center;
      padding: 0 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--black);
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--red);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 16px; height: 16px; fill: white; }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--red); }

    /* ───── HERO ───── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px 60px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff0f2;
      color: var(--red);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
      letter-spacing: -0.2px;
    }

    .hero-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--red);
      border-radius: 50%;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -1.5px;
      color: var(--black);
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--red);
    }

    .hero p {
      font-size: 17px;
      color: var(--gray);
      line-height: 1.7;
      max-width: 500px;
      margin-bottom: 56px;
      letter-spacing: -0.3px;
    }

    /* ───── FORM CARD ───── */
    .form-card {
      width: 100%;
      max-width: 580px;
      background: var(--white);
      border: 1.5px solid #E8E8E8;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      text-align: left;
    }

    .form-section { margin-bottom: 32px; }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 12px;
      letter-spacing: -0.2px;
    }

    .form-label span {
      color: var(--red);
      margin-left: 2px;
    }

    /* 연차 선택 */
    .years-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .year-option input[type="radio"] { display: none; }

    .year-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      border: 1.5px solid #E8E8E8;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: -0.2px;
    }

    .year-option label:hover {
      border-color: var(--red);
      color: var(--red);
      background: #fff0f2;
    }

    .year-option input[type="radio"]:checked + label {
      border-color: var(--red);
      background: var(--red);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(250,0,48,0.25);
    }

    /* 고민 텍스트 */
    .concern-textarea {
      width: 100%;
      height: 130px;
      border: 1.5px solid #E8E8E8;
      border-radius: 10px;
      padding: 16px;
      font-family: 'Pretendard', sans-serif;
      font-size: 15px;
      color: var(--black);
      line-height: 1.6;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      letter-spacing: -0.2px;
    }

    .concern-textarea::placeholder { color: #BBBBBB; }

    .concern-textarea:focus { border-color: var(--red); }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #BBBBBB;
      margin-top: 6px;
    }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      height: 56px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.3px;
      transition: all 0.15s ease;
    }

    .submit-btn:hover {
      background: var(--red);
      box-shadow: 0 6px 20px rgba(250,0,48,0.3);
      transform: translateY(-1px);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn svg { width: 18px; height: 18px; fill: white; }

    /* 하단 키워드 힌트 */
    .hint-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .hint-label {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: -0.2px;
    }

    .hint-tag {
      font-size: 12px;
      color: var(--gray);
      background: var(--light-gray);
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* ───── FOOTER ───── */
    footer {
      padding: 24px 40px;
      border-top: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-size: 13px;
      color: #BBBBBB;
      letter-spacing: -0.2px;
    }

    .footer-logo {
      font-size: 13px;
      font-weight: 700;
      color: #BBBBBB;
    }

    .footer-logo span { color: var(--red); }

    /* ───── RESPONSIVE ───── */
    @media (max-width: 640px) {
      header { padding: 0 20px; }
      .hero { padding: 60px 20px 40px; }
      .form-card { padding: 28px 24px; }
      footer { padding: 20px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="logo" href="index.html">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16"><path d="M3 2h10v2H3zM3 7h10v2H3zM3 12h7v2H3z"/></svg>
      </div>
      <span class="logo-text"><span>SPARTA</span> BOOK</span>
    </a>
  </header>

  <!-- HERO -->
  <main class="hero">
    <span class="hero-badge">팀스파르타 내부 서비스</span>

    <h1>지금 내 고민,<br /><em>팀문화로 풀어줄 책</em></h1>
    <p>연차와 고민을 입력하면 팀스파르타의 핵심가치와 그라운드룰을 기반으로<br />AI가 딱 맞는 책 3권을 추천해드립니다.</p>

    <div class="form-card">

      <!-- 연차 선택 -->
      <div class="form-section">
        <label class="form-label">연차를 선택해주세요 <span>*</span></label>
        <div class="years-grid">
          <div class="year-option">
            <input type="radio" name="years" id="y1" value="0~1년차" />
            <label for="y1">🌱 0~1년차</label>
          </div>
          <div class="year-option">
            <input type="radio" name="years" id="y2" value="2~3년차" />
            <label for="y2">🚀 2~3년차</label>
          </div>
          <div class="year-option">
            <input type="radio" name="years" id="y3" value="4~7년차" />
            <label for="y3">⚡ 4~7년차</label>
          </div>
          <div class="year-option">
            <input type="radio" name="years" id="y4" value="8년차 이상" />
            <label for="y4">🏆 8년차 이상</label>
          </div>
        </div>
      </div>

      <!-- 고민 입력 -->
      <div class="form-section">
        <label class="form-label" for="concern">지금 어떤 고민이 있나요? <span>*</span></label>
        <textarea
          class="concern-textarea"
          id="concern"
          placeholder="예) 팀원에게 피드백을 잘 주고 싶은데 어떻게 해야 할지 모르겠어요. 항상 눈치가 보여서..."
          maxlength="300"
        ></textarea>
        <div class="char-count"><span id="count">0</span> / 300</div>
      </div>

      <!-- 버튼 -->
      <button class="submit-btn" id="submitBtn" onclick="goToResult()">
        <svg viewBox="0 0 20 20"><path d="M9 4.5a.5.5 0 0 1 1 0v6.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L9 11.293V4.5z"/><path d="M3 15.5A1.5 1.5 0 0 0 4.5 17h11a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2z"/></svg>
        책 추천받기
      </button>
    </div>

    <!-- 힌트 태그 -->
    <div class="hint-bar">
      <span class="hint-label">이런 고민에 잘 맞아요 →</span>
      <span class="hint-tag">리더십</span>
      <span class="hint-tag">커뮤니케이션</span>
      <span class="hint-tag">성장</span>
      <span class="hint-tag">실행력</span>
      <span class="hint-tag">팀워크</span>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-text">© 2026 팀스파르타 내부 서비스</span>
    <span class="footer-logo"><span>SPARTA</span> BOOK CURATION</span>
  </footer>

  <script>
    // 글자 수 카운터
    const textarea = document.getElementById('concern');
    const count = document.getElementById('count');
    textarea.addEventListener('input', () => {
      count.textContent = textarea.value.length;
    });

    // 결과 페이지로 이동 (유효성 검사)
    function goToResult() {
      const years = document.querySelector('input[name="years"]:checked');
      const concern = textarea.value.trim();

      if (!years) {
        alert('연차를 선택해주세요!');
        return;
      }
      if (concern.length < 10) {
        alert('고민을 10자 이상 입력해주세요!');
        return;
      }

      // 파라미터로 전달
      const params = new URLSearchParams({
        years: years.value,
        concern: concern
      });
      window.location.href = `result.html?${params.toString()}`;
    }
  </script>
</body>
</html>
